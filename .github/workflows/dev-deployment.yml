name: "Dev deployment"

concurrency: 1

on:
  push:
    branches:
      - staging
  pull_request:
    types:
      - opened
    branches:
      - staging

permissions:
  id-token: write
  contents: read

env:
  DATABRICKS_AUTH_TYPE: github-oidc
  DATABRICKS_HOST: https://e2-demo-field-eng.cloud.databricks.com/
  DATABRICKS_CLIENT_ID: 631442c6-aa03-496f-9abe-52a80aa4e21a

jobs:
  validate:
    name: "Validate bundle"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install dbx_test
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: dev

  deploy:
    name: "Deploy bundle"
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - uses: actions/checkout@v5
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: dev

  run_pipeline:
    name: "Run pipeline update"
    runs-on: ubuntu-latest
    needs:
      - deploy
    steps:
      - uses: actions/checkout@v5
      - uses: databricks/setup-cli@main
      - run: databricks bundle run python_cdc_flow --refresh-all
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: dev
