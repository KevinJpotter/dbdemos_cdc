name: "Dev deployment"

concurrency: 1

on:
  push:
    branches:
      - staging
  pull_request:
    types:
      - opened
    branches:
      - staging

permissions:
  contents: read
  checks: write

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  VENV_PATH: /Users/kevin.potter/actions-runner-venv/bin/activate
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: "Validate bundle"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  deploy:
    name: "Deploy bundle"
    runs-on: self-hosted
    needs:
      - validate
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  seed_data:
    name: "Seed raw data"
    runs-on: self-hosted
    needs:
      - deploy
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle run data_generator
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  run_pipeline:
    name: "Run pipeline update"
    runs-on: self-hosted
    needs:
      - seed_data
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle run python_cdc_flow --refresh-all
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging
          DATABRICKS_HTTP_TIMEOUT: "600"
          DATABRICKS_RETRY_TIMEOUT: "900"

  run_tests:
    name: "Run unit tests"
    runs-on: self-hosted
    needs:
      - run_pipeline
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - name: Install dbx_test
        run: |
          source $VENV_PATH
          pip install dbx_test
      - name: Run notebook tests
        id: run_tests
        run: |
          source $VENV_PATH
          cd declarative-pipeline-cdc
          dbx_test run \
            --config config/test_config.yml \
            --target staging \
            --output-format console \
            --output-format json \
            --output-dir .dbx-test-results
        env:
          DATABRICKS_BUNDLE_ENV: staging
      - name: Convert results to JUnit XML
        if: always() && steps.run_tests.outcome != 'cancelled'
        run: |
          source $VENV_PATH
          python3 << 'PYEOF'
          import json, glob, os, sys, requests
          from xml.etree.ElementTree import Element, SubElement, ElementTree

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]
          headers = {"Authorization": f"Bearer {token}"}

          results_dir = "declarative-pipeline-cdc/.dbx-test-results"
          results_files = sorted(glob.glob(f"{results_dir}/**/*.json", recursive=True))
          if not results_files:
              print("No JSON results found")
              sys.exit(1)

          results_file = results_files[-1]
          print(f"Reading {results_file}")
          with open(results_file) as f:
              data = json.load(f)

          # Fetch notebook exit output from each run and expand into granular tests
          all_tests = []
          for nb_test in data["tests"]:
              run_id = nb_test.get("run_id")
              notebook_name = nb_test["notebook"].split("/")[-1]
              if run_id:
                  try:
                      resp = requests.get(
                          f"{host}/api/2.1/jobs/runs/get-output",
                          headers=headers,
                          params={"run_id": run_id},
                      )
                      resp.raise_for_status()
                      output = resp.json()
                      exit_value = output.get("notebook_output", {}).get("result", "")
                      if exit_value:
                          nb_results = json.loads(exit_value)
                          for t in nb_results.get("tests", []):
                              t["notebook"] = notebook_name
                              all_tests.append(t)
                          print(f"  {notebook_name}: {len(nb_results.get('tests', []))} tests from notebook output")
                          continue
                  except Exception as e:
                      print(f"  Warning: could not fetch output for run {run_id}: {e}")
              # Fallback: use the dbx_test summary entry
              all_tests.append({
                  "notebook": notebook_name,
                  "test_name": nb_test["test_name"],
                  "status": nb_test["status"],
                  "duration": nb_test.get("duration", 0),
                  "error_message": nb_test.get("error_message", ""),
              })

          # Build JUnit XML
          total = len(all_tests)
          failed = sum(1 for t in all_tests if t["status"] == "failed")
          errors = sum(1 for t in all_tests if t["status"] == "error")

          testsuites = Element("testsuites")
          suite = SubElement(testsuites, "testsuite",
              name="dbx_test", tests=str(total),
              failures=str(failed), errors=str(errors),
              timestamp=data.get("timestamp", ""))

          for test in all_tests:
              tc = SubElement(suite, "testcase",
                  classname=test["notebook"],
                  name=test["test_name"],
                  time=str(test.get("duration", 0)))
              if test["status"] == "failed":
                  failure = SubElement(tc, "failure",
                      message=test.get("error_message", "Test failed"))
                  failure.text = test.get("error_message", "")
              elif test["status"] == "error":
                  error = SubElement(tc, "error",
                      message=test.get("error_message", "Test error"))
                  error.text = test.get("error_message", "")

          out_path = os.path.join(os.path.dirname(results_file), "junit-results.xml")
          ElementTree(testsuites).write(out_path, encoding="unicode", xml_declaration=True)
          print(f"Wrote {out_path} ({total} tests: {total - failed - errors} passed, {failed} failed, {errors} errors)")
          PYEOF
      - name: Upload test results
        if: always() && steps.run_tests.outcome != 'cancelled'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dbx-test-results
          path: declarative-pipeline-cdc/.dbx-test-results/**/*
      - name: Test Report
        if: always() && steps.run_tests.outcome != 'cancelled'
        uses: dorny/test-reporter@v1
        with:
          name: "CDC Pipeline Test Results"
          path: "declarative-pipeline-cdc/.dbx-test-results/**/junit-results.xml"
          reporter: java-junit
          fail-on-error: true
