name: "Dev deployment"

concurrency: 1

on:
  push:
    branches:
      - staging
  pull_request:
    types:
      - opened
    branches:
      - staging

permissions:
  contents: read
  checks: write

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  VENV_PATH: /Users/kevin.potter/actions-runner-venv/bin/activate

jobs:
  validate:
    name: "Validate bundle"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle validate
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  deploy:
    name: "Deploy bundle"
    runs-on: self-hosted
    needs:
      - validate
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle deploy
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  seed_data:
    name: "Seed raw data"
    runs-on: self-hosted
    needs:
      - deploy
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle run data_generator
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  run_pipeline:
    name: "Run pipeline update"
    runs-on: self-hosted
    needs:
      - seed_data
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - run: databricks bundle run python_cdc_flow --refresh-all
        working-directory: declarative-pipeline-cdc
        env:
          DATABRICKS_BUNDLE_ENV: staging

  run_tests:
    name: "Run unit tests"
    runs-on: self-hosted
    needs:
      - run_pipeline
    steps:
      - uses: actions/checkout@v5
      - run: source $VENV_PATH
      - uses: databricks/setup-cli@main
      - name: Install dbx_test
        run: |
          source $VENV_PATH
          pip install dbx_test
      - name: Run notebook tests
        run: |
          source $VENV_PATH
          cd declarative-pipeline-cdc
          dbx_test run \
            --config config/test_config.yml \
            --target staging \
            --output-format junit,console,json \
            --output-dir .dbx-test-results
        env:
          DATABRICKS_BUNDLE_ENV: staging
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbx-test-results
          path: declarative-pipeline-cdc/.dbx-test-results/
      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "CDC Pipeline Test Results"
          path: "declarative-pipeline-cdc/.dbx-test-results/**/junit*.xml"
          reporter: java-junit
          fail-on-error: true
