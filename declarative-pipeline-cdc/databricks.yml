# Databricks Asset Bundle Configuration
# https://docs.databricks.com/dev-tools/bundles/

bundle:
  name: declarative-pipeline-cdc
  # databricks_cli_version: "0.208.0"  # Optional: pin CLI version

# Variables available across the bundle (use ${var.catalog}, ${var.schema})
variables:
  catalog:
    default: users
  schema:
    default: kevin_potter


# Deployment targets (environments)
targets:
  dev:
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      # root_path: /Workspace/Users/${var.user}/declarative-pipeline-cdc

  staging:
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      # root_path: /Workspace/staging/declarative-pipeline-cdc

  test:
    mode: development
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      # root_path: /Workspace/test/declarative-pipeline-cdc
    presets:
      name_prefix: "test_"

  prod:
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      # root_path: /Workspace/production/declarative-pipeline-cdc



# Sync files to workspace
sync:
  include:
    - transformations/**/*.py
    - transformations/**/*.sql
    - transformations/**/*.ipynb
    - tests/**/*.ipynb
    - tests/**/*.py
    - config/**/*.yml
  exclude:
    - "*.pyc"
    - "__pycache__"
    - ".dbx-test-results"

# Include pipeline/job definitions
include:
  - resoucres/*.yml
